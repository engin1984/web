<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-ng.in/blog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span
        ><span class="dot g"></span><span class="ttitle">e-ng.in/blog</span>
      </div>
      <div class="body">

        <!-- NAV -->
        <div class="line">
          <a href="index.html" class="link">&lt;- cd .. (back to home)</a>
        </div>

        <div class="divider"></div>

        <!-- BLOG -->
        <div class="line">
          <span class="key">#e-ng.in</span
          ><span class="val" style="color: #005cc5">blog</span>
        </div>
        <div class="line">
          <div><a class="link js-modal-trigger" data-target="blog-modal">My first post: Welcome</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Why I teach chess to kids</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Thoughts on Gifted Education</a></div>
          <div><a class="link js-modal-trigger" data-target="blog-modal">Web tinkering in 2026</a></div>
        </div>

        <div class="divider"></div>

        <span class="cursor"></span>
      </div>
    </div>

    <!-- The Modal -->
    <div id="blog-modal" class="modal">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">> cat post.txt</span>
          <button class="modal-close-btn js-modal-close">X</button>
        </div>
        <div class="line val" style="line-height: 1.6;">
          Content is currently under construction...<br><br>
          <span class="dim">Please check back later!</span>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
